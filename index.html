<head>
   <body>
    <form>
      <div class="menu-border">
        <div class="menu"> 
          <p id="main-menu" class="main-menu"><b> Main Menu </b></p>
            <div class="box">
              <p class="options" style="text-align: center;"><b> Calculator or Converter </b></p>
            </div>
              
            <img alt="This is a GIF for the main menu - it show puple dragon!" id="img0" 
              style="width: 300px;"
              src="https://i6.glitter-graphics.org/pub/2703/2703366fg2vk4b7m7.gif">
          
            <button type="button" class="button open-button" id="density-button"><b> Density </b></button>
            <button type="button" class="button open-button" id="converter-button"><b> Converter </b></button>
          
        </div> 
      </div>
      
      <br> <br> <br>
      
      <dialog class="menuBorder2" id="menuBorder2">
        <div class="menu2" id="menu2"> 
          <button type="button" class="button" id="close-button"><b> Затвори </b></button>
          
            <img id="img1" style="margin: auto; display: block; width: 280px; height: 250px;"
              border: 2px solid black;
              padding: 5px;
              background: transparent;
              src="https://media2.giphy.com/media/3rgXBMsY5I8sNQtbYk/200w.gif?cid=6c09b9522ig3n8v835k183o4i0eboig3g5ln0792i8mcjyjb&ep=v1_gifs_search&rid=200w.gif&ct">
          
          <div class="box3">
            
              <label for="volume"> Insert Volume: (V) </label>
              <input type="number" id="volume" value="0" min="0">
              <br> <br>
  
              <label for="mass"> Insert Mass: (m) </label>
              <input type="number" id="mass" value="0" min="0">
              <br> <br>
            
              <label for="density"> Insert Density: (D) </label>
              <input type="number" id="density" value="0" min="0">
              <br> <br>
  
            </div>
        </div>
      </dialog>
      
      <dialog class="menuBorder3" id="menuBorder3">
        <div class="menu3" id="menu3"> 
          <button type="button" class="button" id="close-button2"><b> Затвори </b></button>
          
            <img alt="This is a GIF for converter!" id="img2" style="margin: auto; display: block; width: 280px; height: 250px;""
              border: 2px solid black;
              padding: 5px;
              background: transparent;"
              src="https://media4.giphy.com/media/3orieMDJKzPq4vPU9q/200w.gif?cid=6c09b952lzgbrztvuy1loi4e2zvr57h2yr7l0j8ws25gdc9r&ep=v1_gifs_search&rid=200w.gif&ct=g">
          
          <div class="box3">
            
              <label for="kilograms"> Kilograms: (kg) </label>
              <input type="number" class="inputs" id="kilograms" min="0" step="0.01" oninput="convertUnits()">
              <br> <br>
  
              <label for="grams"> Grams: (g) </label>
              <input type="number" class="inputs" id="grams" min="0" step="0.01" oninput="convertUnits()">
              <br> <br>
            
              <label for="tons"> Tons: (t) </label>
              <input type="number" class="inputs" id="tons" min="0" step="0.01" oninput="convertUnits()">
              <br> <br>
            
              <label for="pounds"> Pounds: (lb) </label>
              <input type="number" class="inputs" id="pounds" min="0" step="0.01" oninput="convertUnits()">
              <br> <br>
  
            </div>
        </div>
      </dialog>
      
    </form>
  </body>
</head>
    
  <style>
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 50vh;
      flex-direction: column;
      gap: 10px;
      background-color: #e6e6ff;
    }
    
    .menu-border, .menuBorder2, .menuBorder3{
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid black;
      padding: 5px;
      background: white;
    }
    
    .menu div, .menu2 div, .menu3 div{
      box-sizing: border-box;
      margin: 10px;
    }
    
    .menuBorder2::backdrop, .menuBorder3::backdrop {
      background: linear-gradient(45deg, red, blue);
    }
    
    .box, .box2, .box3, .box4 {
      border: 1px solid black;
      padding: 2px;
    }
    
    .main-menu {
      margin: auto;
      display: block;
      width: 157px;
      border-radius: 10px;
      color: white;
      border: 2px solid #39004d;
      background-color: #9999ff;
      text-align: center;
    }
    
    button {
      margin: 5px auto;
      display: block; 
      width: 157px;
      border-radius: 10px;
      color: white;
      border: 2px solid #39004d;
      background-color: #9999ff;
    }
    
    
  </style>
